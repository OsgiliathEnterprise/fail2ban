---
dependency:
  name: galaxy
  enabled: ${DEPENDENCY_ENABLED:-True}
  options:
    role-file: ${REQUIREMENTS_PATH:-requirements.yml}
    requirements-file: requirements-collections.yml
driver:
  name: podman
platforms:
  - name: fail2ban.osgiliath.test
    image: fedora:44
    # image: ubi9/ubi-init:latest
    dockerfile: ../common/Dockerfile.j2
    # registry:
    #   url: registry.access.redhat.com
    privileged: True
    command: "/sbin/init"
    systemd: True
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    # network: "firewalld_network"
    # subnet: '10.3.1.0/24'
    dns_servers:
      - 8.8.8.8
#    capabilities:
#      - SYS_ADMIN
#      - CAP_SYS_TIME
    # pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_COLLECTIONS_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../community-collections:${ANSIBLE_COLLECTIONS_PATH}"
    ANSIBLE_REMOTE_TMP: /var/tmp/ansible-remote
    ANSIBLE_ASYNC_DIR: "/tmp/.ansible_async"
  options:
    vvv: True
  config_options:
    defaults:
      remote_tmp: /var/tmp/ansible-remote
verifier:
  name: testinfra
  env:
    PYTHONWARNINGS: "ignore:.*U.*mode is deprecated:DeprecationWarning"
  options:
    v: 1
